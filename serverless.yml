# serverless.yml
service: ai-proposal-api
useDotenv: true

provider:
  name: aws
  profile: Team-GV-Zain
  region: us-east-1
  stage: dev
  ecr:
    images:
      appimage:
        path: ./
        platform: linux/amd64

functions:
  api:
    image:
      name: appimage
    timeout: 29
    memorySize: 2048
    environment:
      # Add ALL your environment variables here
      GROQ_API_KEY: ${env:GROQ_API_KEY}
      GOOGLE_API_KEY: ${env:GOOGLE_API_KEY}
      PINECONE_API_KEY: ${env:PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${env:PINECONE_INDEX_NAME, "freelance-portfolio-2"}
      LLM_PROVIDER: ${env:LLM_PROVIDER, "groq"}
      USE_DYNAMODB: ${env:USE_DYNAMODB, "false"}
      USERS_TABLE_NAME: ${env:USERS_TABLE_NAME, "Users-Table"}
      USERS_PROPOSALS_TABLE_NAME: ${env:USERS_PROPOSALS_TABLE_NAME, "Users-Proposals"}
      TASKS_TABLE_NAME: ${env:TASKS_TABLE_NAME, "Proposal-Tasks"}
      RETRIEVAL_MAX_RETRIES: ${env:RETRIEVAL_MAX_RETRIES, "3"}
      SUMMARY_TRIGGER_MESSAGES: ${env:SUMMARY_TRIGGER_MESSAGES, "10"}
      RECENT_MESSAGES_TO_KEEP: ${env:RECENT_MESSAGES_TO_KEEP, "10"}
      CUSTOM_TEMPLATE_CHAR_LIMIT: ${env:CUSTOM_TEMPLATE_CHAR_LIMIT, "2500"}
      CUSTOM_TEMPLATE_WORD_LIMIT: ${env:CUSTOM_TEMPLATE_WORD_LIMIT, "400"}
    events:
      - httpApi:
          path: /{proxy+}
          method: '*'
